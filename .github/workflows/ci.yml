name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud dev build
        shell: pwsh
        run: |
          $dalamudUrl = "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
          $dalamudDir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dalamudDir | Out-Null
          Invoke-WebRequest -Uri $dalamudUrl -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dalamudDir -Force
          Remove-Item dalamud.zip

      - name: Restore
        run: dotnet restore Dalamud.LoadingImage.sln

      - name: Build (Release)
        run: dotnet build Dalamud.LoadingImage.sln --configuration Release --no-restore

      - name: Upload plugin artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Dalamud.LoadingImage-plugin
          path: Dalamud.LoadingImage/bin/x64/Release/Dalamud.LoadingImage/latest.zip
          if-no-files-found: warn