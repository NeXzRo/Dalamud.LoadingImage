name: Update Download Count

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch download count from GitHub API
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq '[.[].assets[].download_count] | add // 0')
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Update local repo.json
        run: |
          jq --argjson c ${{ steps.count.outputs.total }} \
             '(.[0].DownloadCount) = $c' repo.json > repo.json.tmp
          mv repo.json.tmp repo.json

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add repo.json
          if ! git diff --cached --quiet; then
            git commit -m "Update DownloadCount to ${{ steps.count.outputs.total }}"
            # Retry-Logik mit Rebase eingefügt
            for i in 1 2 3 4 5; do
              git fetch origin main
              git pull --rebase --autostash -X theirs origin main
              git push origin HEAD:main && exit 0
              sleep 2
            done
            exit 1
          else
            echo "No change in download count."
          fi

      - name: Mirror updated count into NeXzRo/Repo
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then exit 0; fi
          git clone --depth 1 "https://x-access-token:${REPO_TOKEN}@github.com/NeXzRo/Repo.git" hub
          cd hub
          INTERNAL_NAME=$(jq -r '.[0].InternalName' ../repo.json)
          COUNT=${{ steps.count.outputs.total }}
          jq --arg name "$INTERNAL_NAME" --argjson c $COUNT \
            'map(if .InternalName == $name then .DownloadCount = $c else . end)' \
            repo.json > repo.json.tmp
          mv repo.json.tmp repo.json
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add repo.json
          if ! git diff --cached --quiet; then
            git commit -m "Update DownloadCount for $INTERNAL_NAME to $COUNT"
            # Retry-Logik mit Rebase eingefügt
            for i in 1 2 3 4 5; do
              git fetch origin main
              git pull --rebase --autostash -X theirs origin main
              git push origin HEAD:main && exit 0
              sleep 2
            done
            exit 1
          fi