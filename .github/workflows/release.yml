name: Release Dalamud.LoadingImage

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          ref_name="${{ github.ref_name }}"
          input_tag="${{ inputs.tag }}"
          if [ -n "$input_tag" ]; then
            target="$input_tag"
          else
            target="$ref_name"
          fi
          if [[ ! "$target" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            exit 1
          fi
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "version=${target#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.target }}
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global core.autocrlf false
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud dev build
        shell: pwsh
        run: |
          $dalamudUrl = "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
          $dalamudDir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dalamudDir | Out-Null
          Invoke-WebRequest -Uri $dalamudUrl -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dalamudDir -Force
          Remove-Item dalamud.zip

      - name: Build (Release)
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          dotnet build Dalamud.LoadingImage.sln --configuration Release -p:Version=$version

      - name: Stage latest.zip
        shell: pwsh
        run: |
          $src = 'Dalamud.LoadingImage/bin/x64/Release/Dalamud.LoadingImage/latest.zip'
          if (-not (Test-Path $src)) { throw "Plugin zip not found" }
          Copy-Item $src 'latest.zip' -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.target }}
          name: ${{ steps.tag.outputs.target }}
          files: latest.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Fetch total download count
        id: count
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq '[.[].assets[].download_count] | add // 0')
          echo "total=$total" >> "$GITHUB_OUTPUT"

      - name: Update local repo.json
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TOTAL: ${{ steps.count.outputs.total }}
        run: |
          python3 - <<PYEOF
          import json, os, time
          with open('repo.json', 'r', encoding='utf-8-sig') as f:
              data = json.load(f)
          data[0]['AssemblyVersion'] = os.environ['VERSION']
          data[0]['TestingAssemblyVersion'] = os.environ['VERSION']
          data[0]['DownloadCount'] = int(os.environ['TOTAL'])
          data[0]['LastUpdate'] = int(time.time())
          with open('repo.json', 'w', encoding='utf-8', newline='\n') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          PYEOF

      - name: Commit local repo.json
        shell: bash
        run: |
          git add repo.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Release ${{ steps.tag.outputs.target }}: bump repo.json"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git pull --rebase --autostash -X theirs origin main
            git push origin HEAD:main && exit 0
            sleep 2
          done
          exit 1

      - name: Notify NeXzRo/Repo to regenerate
        shell: bash
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$REPO_TOKEN" ]; then exit 0; fi
          curl -s -X POST \
            -H "Authorization: Bearer ${REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/NeXzRo/Repo/dispatches \
            -d '{"event_type":"plugin-released","client_payload":{"plugin":"Dalamud.LoadingImage"}}'
